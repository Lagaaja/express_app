services:
  express-app:
    image: lagaaja/express-app:latest
    build: .
    ports:
      - 8080:8080
    restart: unless-stopped
  
  watchtower:
    image: nickfedor/watchtower
    environment:
      -  WATCHTOWER_POLL_INTERVAL=60 # Poll every 60 seconds
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: watchtower
    restart: unless-stopped